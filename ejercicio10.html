<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de temperatura | Ejercicio 10</title>
    <script src="js/ejercicio10.js"></script>
    <link rel="stylesheet" href="css/ejercicio10.css">
</head>
<body>
    <div class="contenedor-formulario">
    <h1>Conversor de grados Celsius a Fahrenheit</h1>

    <form class="formulario">
    <div class="grupo-formulario">
        <label for="celsius">Ingrese la temperatura (En Celsius)</label>
        <input type="number" id="celsius" placeholder="Ejemplo: 21" required >
    </div>
    
    <div class="grupo-formulario">
        <input type="number" id="fahrenheit" readonly placeholder="El resultado aparecerá aquí">
    </div>

    <button type="button" class="boton-enviar" onclick="conversion()" style="width: 100%;">
        Convertir
    </button>
</form>
</div>
    
</body>
</html>
