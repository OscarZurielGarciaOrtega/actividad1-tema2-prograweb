<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Tareas | Ejercicio 17</title>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <link rel="stylesheet" href="css/ejercicio17.css">
</head>
<body>
    <div class="contenedor-formulario">
        <h1>Gestión de Tareas Pendientes</h1>

        <form class="formulario" onsubmit="event.preventDefault();">
            <div class="grupo-formulario">
                <label for="nuevaTarea">Por favor, Ingresa una nueva tarea.</label>
                <input type="text" id="nuevaTarea" placeholder="Ejemplo: Estudiar JavaScript" required>
                
                <button type="button" class="boton-enviar" onclick="agregarDesdeUI()" style="width: 100%;">
                    Agregar Tarea
                </button>
            </div>
            
            <div class="grupo-formulario">
                <label>Mis Tareas (Guardadas en Local Storage):</label>
                <div id="lista-tareas" class="contenedor-lista"></div>
            </div>
        </form>
    </div>
    
    <script src="js/ejercicio17.js"></script>
</body>
</html>
