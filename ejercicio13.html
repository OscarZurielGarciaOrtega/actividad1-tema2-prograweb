<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación de Edad | Ejercicio 13</title>
    <script src="js/ejercicio13.js"></script>
    <link rel="stylesheet" href="css/ejercicio13.css">
</head>
<body>
    <div class="contenedor-formulario">
        <h1>Verificador de Edad</h1>

        <form class="formulario">
            <div class="grupo-formulario">
                <label for="edad">Por favor, ingrese su edad.</label>
                <input type="number" id="edad" placeholder="Ejemplo: 20" required min="1">
            </div>
            <div class="grupo-formulario">
                <input type="text" id="resultado" readonly placeholder="El resultado aparecerá aquí">
            </div>

            <button type="button" class="boton-enviar" onclick="verificar()" style="width: 100%;">
                Verificar
            </button>
        </form>
    </div>
    
</body>
</html>
