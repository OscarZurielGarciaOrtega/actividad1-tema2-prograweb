<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numeros | Ejercicio 14</title>
    <script src="js/ejercicio14.js"></script>
    <link rel="stylesheet" href="css/ejercicio14.css">
</head>
<body>
    <div class="contenedor-formulario">
        <h1>Numeros</h1>

        <form class="formulario">
            <div class="grupo-formulario">
                <label for="numeros">Por favor ingrese su cadena de números.</label>
                <input type="text" id="numeros" placeholder="Ejemplo: 1,2,3" required>
            </div>
            <div class="grupo-formulario">
                <input type="text" id="numMayor" readonly placeholder="numero mayor">
                <input type="text" id="numMenor" readonly placeholder="numero menor">
                <input type="text" id="promedio" readonly placeholder="promedio">
            </div>

            <button type="button" class="boton-enviar" onclick="calculo()" style="width: 100%;">
                Calcular
            </button>
        </form>
    </div>
    
</body>
</html>
